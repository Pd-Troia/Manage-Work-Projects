name: Release

on:
  push:
    branches: [main]
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  warm-cache:
    runs-on: windows-latest
    if: github.ref_type == 'branch'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Warm Rust cache
        run: cargo fetch
        working-directory: src-tauri

  release:
    runs-on: windows-latest
    if: github.ref_type == 'tag' && github.event.base_ref == 'refs/heads/main'
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm install

      - name: Debug secrets
        shell: bash
        run: |
          echo "PRIVATE_KEY length: ${#TAURI_SIGNING_PRIVATE_KEY}"
          echo "PASSWORD length: ${#TAURI_SIGNING_PRIVATE_KEY_PASSWORD}"
          echo "PRIVATE_KEY first line: $(echo \"$TAURI_SIGNING_PRIVATE_KEY\" | head -1)"
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: ${{ github.ref_name }}
          releaseBody: ''
          releaseDraft: false
          prerelease: false
          updaterJsonPreferNsis: true

      - name: List bundle artifacts
        if: always()
        shell: bash
        run: |
          echo "=== NSIS bundle ==="
          ls -la src-tauri/target/release/bundle/nsis/ || true
          echo "=== MSI bundle ==="
          ls -la src-tauri/target/release/bundle/msi/ || true
          echo "=== SIG contents ==="
          for f in src-tauri/target/release/bundle/nsis/*.sig src-tauri/target/release/bundle/msi/*.sig; do
            if [ -f "$f" ]; then
              echo "--- $f ---"
              cat "$f" | head -2
            fi
          done
